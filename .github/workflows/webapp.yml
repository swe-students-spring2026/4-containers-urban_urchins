name: webapp tests

on:
  pull_request:
    branches: [main]

jobs:
  test-ml-client:
    name: webapp (python 3.10)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web-app
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: set up python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: install pipenv
        run: pip install pipenv

      - name: install dependencies
        run: pipenv install --dev

      - name: run pytest
        run: pipenv run pytest --cov=. tests/*
